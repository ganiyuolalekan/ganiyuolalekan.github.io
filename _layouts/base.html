<!DOCTYPE html>
<html lang="en">

    <head>
        {% include _basic_head.html %}
    </head>

    <body>

        {% include _header.html %}

        <main>
            <div class="space"></div>

            {% include _browser-upgrade.html %}

            <div class="container">
                <div class="container">
                    <h2 class="on-mobile">{{ page.title }}</h2>

                    {% for post in site.categories %}
                        <div class="article">
                            <span class="title c">
                                <a href="{{ site.github.url }}{{ post.url }}" title="{{ post.title }}">
                                    {{ post.title }}
                                </a>
                            </span>
                        </div>
                    {% endfor %}
                </div>

                <footer class="centered">
                    <div class="space"></div>
                    {% include _basic_footer.html %}
                </footer>
            </div>
        </main>

        {% include _basic_scripts.html %}

    </body>

</html>
